<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5;}
.box{width:350px;background:white;padding:30px;border-radius:10px;}
input{width:100%;padding:10px;margin:10px 0;}
button{width:100%;padding:10px;background:#2d6a4f;color:white;border:none;cursor:pointer;border-radius:6px;}
</style>
</head>
<body>
<div class="box">
<h2>Admin Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<script>
async function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const response = await fetch("/api/login", {
        method: "POST",
        credentials: 'include',
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });
    const result = await response.json();
    if(result.success){
        // server sets httpOnly cookie; redirect to admin
        location.href = "/admin";
    } else {
        alert("Invalid login");
    }
}
</script>
</body>
</html>
